name: Sync from Coda

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install dotenv

      - name: Pull latest data from Coda
        env:
          CODA_TOKEN: ${{ secrets.CODA_TOKEN }}
        run: node sync.mjs

      - name: Commit if anything changed
        run: |
          if [[ -n "$(git status --porcelain data.js)" ]]; then
            git config user.name  "coda-sync-bot"
            git config user.email "bot@users.noreply.github.com"
            git add data.js
            git commit -m "chore: sync data.js from Coda"
            git push
          else
            echo "No changes from Coda — skipping commit."
          fi
