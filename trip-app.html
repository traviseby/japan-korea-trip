<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Superhuman Trips</title>

<!-- PWA / iOS install -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Superhuman Trips">
<meta name="theme-color" content="#0d0d0d">

<!-- Inline samurai-helmet app icon (Japanese red on near-black, geometric) -->
<link rel="apple-touch-icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60"><rect width="60" height="60" rx="14" fill="%230d0d0d"/><g fill="%23c0392b"><path d="M30 13c-9 0-16 6-16 14 0 2 0 4 1 5l-2 6c-1 2 1 4 3 3l4-2c3 2 6 3 10 3s7-1 10-3l4 2c2 1 4-1 3-3l-2-6c1-1 1-3 1-5 0-8-7-14-16-14z"/><path d="M14 30l-4-3c-1-1-1-3 1-3l4 1z"/><path d="M46 30l4-3c1-1 1-3-1-3l-4 1z"/></g><circle cx="30" cy="28" r="2" fill="%230d0d0d"/></svg>'>

<!-- Type pairing: serif for places & day headers, sans for UI -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<link rel="stylesheet" href="styles.css">

<script>
// iOS viewport height fix - MUST run before page renders
(function() {
  function setVH() {
    const vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', vh + 'px');
  }
  setVH();
  window.addEventListener('resize', setVH);
  window.addEventListener('orientationchange', setVH);
})();
</script>
</head>
<body>

<!-- Phone-fullscreen wrapper: in standalone install, this is the entire viewport. -->
<div class="phone-fullscreen">

<div id="app">

  <!-- Status bar simulation (real iPhone covers this with its own) -->
  <div class="status-bar">
  </div>

  <!-- Tab views -->
  <div class="tabview">

    <!-- TODAY -->
    <div class="tab-pane active" id="tab-today">
      <div class="filter-bar" id="itinerary-bar"></div>
      <div class="scroll today-scroll"></div>
    </div>

    <!-- MAP -->
    <div class="tab-pane" id="tab-map">
      <div class="filter-bar" id="filter-bar-map"></div>
      <div class="map-tab">
        <div class="map-container">
          <button id="locate-me" class="map-action-btn" aria-label="My location">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
          </button>
          <div id="segmented" class="segmented">
            <button data-region="JP" class="active">🇯🇵 Japan</button>
            <button data-region="KR">🇰🇷 Korea</button>
          </div>
          <div id="map-full"></div>
        </div>
      </div>
    </div>

    <!-- ACTIVITIES -->
    <div class="tab-pane" id="tab-activities">
      <div class="filter-bar" id="filter-bar-activities"></div>
      <div class="scroll act-list" id="activities-list"></div>
    </div>

    <!-- TO-DO -->
    <div class="tab-pane" id="tab-todo">
      <div class="filter-bar" id="todo-header"></div>
      <div class="scroll todo-tab" id="todo-content"></div>
    </div>

    <!-- SETTINGS -->
    <div class="tab-pane" id="tab-settings">
      <div class="filter-bar" id="settings-header"></div>
      <div class="scroll" id="settings-content"></div>
    </div>

  </div>

  <!-- Bottom tab bar -->
  <nav class="tabbar">
    <button data-tab="today" class="active">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>
      </span>
      <span class="tab-label">Today</span>
    </button>
    <button data-tab="map">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      </span>
      <span class="tab-label">Map</span>
    </button>
    <button data-tab="activities">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="8" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.2" fill="currentColor"/><circle cx="4" cy="12" r="1.2" fill="currentColor"/><circle cx="4" cy="18" r="1.2" fill="currentColor"/></svg>
      </span>
      <span class="tab-label">Activities</span>
    </button>
    <button data-tab="todo">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="3 7 5 9 9 5"/><line x1="13" y1="7" x2="20" y2="7"/><polyline points="3 14 5 16 9 12"/><line x1="13" y1="14" x2="20" y2="14"/><polyline points="3 21 5 21 5 21"/><line x1="13" y1="20" x2="20" y2="20"/></svg>
      </span>
      <span class="tab-label">To-Do</span>
    </button>
    <button data-tab="settings">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </span>
      <span class="tab-label">Settings</span>
    </button>
  </nav>

</div>

<!-- Activity detail bottom sheet -->
<div id="sheet-backdrop" class="sheet-backdrop"></div>
<div id="sheet" class="sheet"></div>

<!-- Fullscreen day map -->
<div id="fullscreen-map" class="fullscreen-map">
  <div class="fm-header">
    <div id="fm-title" class="fm-title">Day —</div>
    <button id="fm-back" class="back-btn" aria-label="Close">✕</button>
  </div>
  <button id="fm-locate" class="map-action-btn" aria-label="My location">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
  </button>
  <div id="map-fullscreen"></div>
</div>

<!-- Offline banner -->
<div id="offline-banner" class="offline-banner">📡 Offline</div>

<!-- Filter tray (Map + Activities) -->
<div id="filter-tray-backdrop" class="sheet-backdrop"></div>
<div id="filter-tray" class="sheet tray"></div>

</div><!-- /phone-fullscreen -->

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
