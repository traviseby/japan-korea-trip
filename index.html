<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Supertrips</title>

<!-- PWA / iOS install -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Supertrips">
<meta name="theme-color" content="#0d0d0d">

<!-- Airplane emoji favicon and app icon -->
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="0.9em" font-size="90">✈️</text></svg>'>
<link rel="apple-touch-icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%230d0d0d"/><text x="50" y="70" font-size="70" text-anchor="middle">✈️</text></svg>'>

<!-- Type pairing: serif for places & day headers, sans for UI -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<link rel="stylesheet" href="styles.css?v=2.82">
<link rel="stylesheet" href="plan/plan-styles.css?v=2.82">

<script>
// iOS standalone PWA layout — MUST run before first paint.
// WebKit bug: fixed bottom:0 anchors to a viewport ~59px short of the screen.
// Fix: flex tab bar (not fixed) + 100vh shell height + hide simulated status bar.
(function() {
  function isStandalonePWA() {
    return window.navigator.standalone === true
      || window.matchMedia('(display-mode: standalone)').matches;
  }

  if (isStandalonePWA()) {
    document.documentElement.classList.add('ios-standalone');
    document.documentElement.style.setProperty('--app-height', '100vh');
  }

  window.addEventListener('orientationchange', function() {
    if (isStandalonePWA()) {
      document.documentElement.style.setProperty('--app-height', '100vh');
    }
  });
})();
</script>
</head>
<body>

<!-- Phone-fullscreen wrapper: in standalone install, this is the entire viewport. -->
<div class="phone-fullscreen">

<div id="app">

  <!-- Status bar simulation (real iPhone covers this with its own) -->
  <div class="status-bar">
  </div>

  <!-- Tab views -->
  <div class="tabview">

    <!-- TODAY -->
    <div class="tab-pane active" id="tab-today">
      <div class="filter-bar" id="itinerary-bar"></div>
      <div class="scroll today-scroll"></div>
    </div>

    <!-- MAP -->
    <div class="tab-pane" id="tab-map">
      <div class="filter-bar" id="filter-bar-map"></div>
      <div class="map-tab">
        <div class="map-container">
          <button id="locate-me" class="map-action-btn" aria-label="My location">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
          </button>
          <div id="segmented" class="segmented">
            <button data-region="JP" class="active">🇯🇵 Japan</button>
            <button data-region="KR">🇰🇷 Korea</button>
          </div>
          <div id="map-full"></div>
        </div>
      </div>
    </div>

    <!-- ACTIVITIES -->
    <div class="tab-pane" id="tab-activities">
      <div class="filter-bar" id="filter-bar-activities"></div>
      <div class="scroll act-list" id="activities-list"></div>
    </div>

    <!-- BOOKINGS -->
    <div class="tab-pane" id="tab-bookings">
      <div class="filter-bar" id="filter-bar-bookings"></div>
      <div class="scroll" id="bookings-list"></div>
    </div>

    <!-- SETTINGS -->
    <div class="tab-pane" id="tab-settings">
      <div class="filter-bar" id="settings-header"></div>
      <div class="scroll" id="settings-content"></div>
    </div>

    <!-- Plan Mode Screens -->
    <div id="plan-about" class="tab-pane plan-screen">
      <!-- Survey or about content will be rendered here by plan-app.js -->
    </div>

    <div id="plan-hotels" class="tab-pane plan-screen">
      <div class="filter-bar">
        <div class="filter-label">Hotels</div>
      </div>
      <div class="scroll">
        <div style="padding: 40px 20px; text-align: center; color: var(--fg-mid);">
          Hotels screen coming soon...
        </div>
      </div>
    </div>

    <div id="plan-flights" class="tab-pane plan-screen">
      <div class="filter-bar">
        <div class="filter-label">Flights</div>
      </div>
      <div class="scroll">
        <div style="padding: 40px 20px; text-align: center; color: var(--fg-mid);">
          Flights screen coming soon...
        </div>
      </div>
    </div>

    <div id="plan-activities" class="tab-pane plan-screen">
      <div class="filter-bar">
        <div class="filter-label">Activities</div>
      </div>
      <div class="scroll">
        <div style="padding: 40px 20px; text-align: center; color: var(--fg-mid);">
          Activities screen coming soon...
        </div>
      </div>
    </div>

    <div id="plan-generate" class="tab-pane plan-screen">
      <div class="filter-bar">
        <div class="filter-label">Generate</div>
      </div>
      <div class="scroll">
        <div style="padding: 40px 20px; text-align: center; color: var(--fg-mid);">
          Generate screen coming soon...
        </div>
      </div>
    </div>

    <!-- TO-DO (moved to Plan mode) -->
    <div id="plan-todo" class="tab-pane plan-screen">
      <div class="filter-bar" id="plan-todo-header"></div>
      <div class="scroll todo-tab" id="plan-todo-content"></div>
    </div>

  </div>

  <!-- Bottom tab bar (Travel Mode) -->
  <nav class="tabbar travel-tabbar">
    <button data-tab="today" class="active">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>
      </span>
      <span class="tab-label">Today</span>
    </button>
    <button data-tab="map">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      </span>
      <span class="tab-label">Map</span>
    </button>
    <button data-tab="activities">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="8" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.2" fill="currentColor"/><circle cx="4" cy="12" r="1.2" fill="currentColor"/><circle cx="4" cy="18" r="1.2" fill="currentColor"/></svg>
      </span>
      <span class="tab-label">Activities</span>
    </button>
    <button data-tab="bookings">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      </span>
      <span class="tab-label">Bookings</span>
    </button>
    <button data-tab="settings">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </span>
      <span class="tab-label">Settings</span>
    </button>
  </nav>

  <!-- Bottom tab bar (Plan Mode) -->
  <nav class="tabbar plan-tabbar" style="display: none;">
    <button data-plan-tab="about" class="active">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </span>
      <span class="tab-label">About</span>
    </button>
    <button data-plan-tab="hotels">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="9" y2="9.01"/><line x1="15" y1="9" x2="15" y2="9.01"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
      </span>
      <span class="tab-label">Hotels</span>
    </button>
    <button data-plan-tab="flights">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10.5 2L3 9l4 4.5L3 18l3 3 4.5-4L15 21l7-7.5L10.5 2z"/></svg>
      </span>
      <span class="tab-label">Flights</span>
    </button>
    <button data-plan-tab="activities">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="8" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.2" fill="currentColor"/><circle cx="4" cy="12" r="1.2" fill="currentColor"/><circle cx="4" cy="18" r="1.2" fill="currentColor"/></svg>
      </span>
      <span class="tab-label">Activities</span>
    </button>
    <button data-plan-tab="generate">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </span>
      <span class="tab-label">Generate</span>
    </button>
    <button data-plan-tab="todo">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="3 7 5 9 9 5"/><line x1="13" y1="7" x2="20" y2="7"/><polyline points="3 14 5 16 9 12"/><line x1="13" y1="14" x2="20" y2="14"/><polyline points="3 21 5 21 5 21"/><line x1="13" y1="20" x2="20" y2="20"/></svg>
      </span>
      <span class="tab-label">To-Do</span>
    </button>
  </nav>

</div>

<!-- Activity detail bottom sheet -->
<div id="sheet-backdrop" class="sheet-backdrop"></div>
<div id="sheet" class="sheet"></div>

<!-- Add activity bottom sheet -->
<div id="add-activity-backdrop" class="sheet-backdrop"></div>
<div id="add-activity-sheet" class="sheet"></div>
<div id="edit-activity-backdrop" class="sheet-backdrop sheet-stack-2"></div>
<div id="edit-activity-sheet" class="sheet sheet-stack-2"></div>

<!-- Fullscreen day map -->
<div id="fullscreen-map" class="fullscreen-map">
  <div class="fm-header">
    <div id="fm-title" class="fm-title">Day —</div>
    <button id="fm-back" class="back-btn" aria-label="Close">✕</button>
  </div>
  <button id="fm-locate" class="map-action-btn" aria-label="My location">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
  </button>
  <div id="map-fullscreen"></div>
</div>

<!-- Offline banner -->
<div id="offline-banner" class="offline-banner">📡 Offline</div>

<!-- Filter tray (Map + Activities) -->
<div id="filter-tray-backdrop" class="sheet-backdrop"></div>
<div id="filter-tray" class="sheet tray"></div>

</div><!-- /phone-fullscreen -->

<script src="demo-data.js?v=2.46"></script>
<script src="supertrip-loader.js?v=2.43"></script>
<script src="app.js?v=2.82"></script>
<script src="plan/plan-app.js?v=2.46"></script>

</body>
</html>
