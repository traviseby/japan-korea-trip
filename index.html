<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Superhuman Trips · iPhone 15 Pro Preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="0.9em" font-size="90">✈️</text></svg>'>

<script>
// Redirect mobile devices to the app without phone frame
(function() {
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) 
    || ('ontouchstart' in window && window.innerWidth < 768);
  
  if (isMobile && (window.location.pathname === '/' || window.location.pathname === '/index.html')) {
    // Preserve query parameters when redirecting
    window.location.replace('/trip-app.html' + window.location.search);
  }
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="plan/plan-styles.css">

<style>
  /* Preview chrome — wraps the real app in an iPhone 15 Pro frame */
  html, body {
    background: #050505;
    color: #f4f3f0;
    font-family: 'Manrope', -apple-system, system-ui, sans-serif;
    margin: 0; padding: 0; min-height: 100%;
  }
  .stage {
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 400px; /* Large bottom padding to enable page scroll */
    background:
      radial-gradient(1100px 600px at 80% -10%, rgba(192,57,43,0.06), transparent 60%),
      radial-gradient(900px 500px at 10% 110%, rgba(41,128,185,0.05), transparent 60%),
      #050505;
    background-attachment: fixed;
  }
  .header {
    width: 100%;
    max-width: 1100px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    padding: 0 4px;
    gap: 24px;
  }
  .brand {
    font-family: 'Noto Serif JP', Georgia, serif;
    font-size: 22px; font-weight: 400; letter-spacing: 0.005em;
  }
  .brand .kicker {
    display: block;
    font-family: 'Manrope', sans-serif;
    font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    color: #6f6c64; margin-bottom: 4px; font-weight: 500;
    white-space: nowrap;
  }
  .meta {
    text-align: right;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #6f6c64; font-weight: 500; line-height: 1.7;
    white-space: nowrap;
  }
  .meta .row1 { color: #f4f3f0; }
  .fullscreen-link {
    color: #f4f3f0;
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 2px;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .fullscreen-link:hover {
    color: #fff;
    border-bottom-color: rgba(255,255,255,0.5);
  }

  .quick-jump {
    display: flex; gap: 6px;
    margin: 0 0 22px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 999px;
    padding: 4px;
  }
  .quick-jump button {
    font: inherit;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
    color: #6f6c64;
    background: transparent;
    border: 0;
    padding: 9px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .quick-jump button:hover { color: #f4f3f0; }
  .quick-jump button.active { color: #050505; background: #f4f3f0; }

  /* iPhone 15 Pro frame */
  .device-wrap { position: relative; }
  .device {
    width: 432px;
    aspect-ratio: 432 / 891;
    border-radius: 60px;
    background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 25%, #1a1a1a 75%, #2a2a2a 100%);
    padding: 19px;
    position: relative;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.12) inset,
      0 -1px 0 rgba(0,0,0,0.5) inset,
      0 40px 100px -25px rgba(0,0,0,0.7),
      0 70px 140px -50px rgba(0,0,0,0.55),
      0 0 0 0.5px rgba(255,255,255,0.04);
  }
  .device::before {
    content: ""; position: absolute; inset: 0;
    border-radius: 60px; pointer-events: none;
    background: linear-gradient(135deg, rgba(255,255,255,0.10), transparent 35%, transparent 65%, rgba(255,255,255,0.06));
    mix-blend-mode: overlay;
  }
  .device::after {
    content: "";
    position: absolute; left: -2px; top: 200px;
    width: 4px; height: 100px;
    background: linear-gradient(to bottom, #2a2a2a, #161616, #2a2a2a);
    border-radius: 2px 0 0 2px;
    box-shadow: 0 110px 0 -8px #2a2a2a, 0 -130px 0 -5px #2a2a2a;
  }
  .screen {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 44px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 0 0.5px rgba(255,255,255,0.06) inset;
    isolation: isolate;
  }
  /* Override .phone-fullscreen position to be relative-inside-screen */
  .screen .phone-fullscreen {
    position: absolute !important; inset: 0 !important;
    display: flex !important;
    flex-direction: column !important;
  }
  /* Override #app to flex layout so tabbar stays at bottom */
  .screen #app {
    display: flex !important;
    flex-direction: column !important;
    height: 100% !important;
  }
  .screen .tabview {
    flex: 1 !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
  }
  /* Override .tabbar to not be fixed in phone frame preview */
  .screen .tabbar {
    position: relative !important;
    flex-shrink: 0 !important;
  }
  .island {
    position: absolute;
    top: 11px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 35px;
    background: #000;
    border-radius: 20px;
    z-index: 70;
    pointer-events: none;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.9);
  }
  .island::after {
    content: "";
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a1a2e 30%, #060615 70%);
  }

  .caption {
    margin-top: 18px;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: #6f6c64; text-align: center; font-weight: 500;
  }
  .caption a {
    color: #f4f3f0; text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 1px;
    margin-left: 4px;
  }

  @media (max-width: 520px){
    .stage { padding: 16px 8px 32px; }
    .header { flex-direction: column; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
    .meta { text-align: left; }
    .fullscreen-link { display: inline-block; }
    .device { width: min(100%, 432px); padding: 12px; border-radius: 44px; }
    .device::after { display: none; }
    .screen { border-radius: 32px; }
    .quick-jump { flex-wrap: wrap; justify-content: center; }
  }
</style>

<script>
// iOS viewport height fix - MUST run before page renders
(function() {
  function setVH() {
    const vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', vh + 'px');
  }
  setVH();
  window.addEventListener('resize', setVH);
  window.addEventListener('orientationchange', setVH);
})();
</script>
</head>
<body>

  <header class="header">
    <div class="brand">
      <span class="kicker">Companion App</span>
      Superhuman Trips
    </div>
    <div class="meta">
      <a href="/trip-app.html" target="_blank" class="fullscreen-link">View Full Screen →</a>
    </div>
  </header>

  <div class="quick-jump" id="qj">
    <button data-tab="today" class="active">Today</button>
    <button data-tab="map">Map</button>
    <button data-tab="activities">Activities</button>
    <button data-tab="todo">To-Do</button>
  </div>

  <div class="device-wrap">
    <div class="device">
      <div class="screen">
        <div class="island"></div>

        <!-- ─── The actual PWA, inlined (mirrors trip-app.html) ─── -->
        <div class="phone-fullscreen">
          <div id="app">

            <div class="status-bar">
            </div>

            <div class="tabview">
              <div class="tab-pane active" id="tab-today">
                <div class="filter-bar" id="itinerary-bar"></div>

                    </button>
                    <div id="segmented" class="segmented">
                      <button data-region="JP" class="active">🇯🇵 Japan</button>
                      <button data-region="KR">🇰🇷 Korea</button>

                    <div id="map-full"></div>
                  </div>
                </div>
              </div>
              <div class="tab-pane" id="tab-activities">
                <div class="filter-bar" id="filter-bar-activities"></div>
                <div class="scroll act-list" id="activities-list"></div>
              </div>
              <div class="tab-pane" id="tab-todo">
                <div class="filter-bar" id="todo-header"></div>
                <div class="scroll todo-tab" id="todo-content"></div>
              </div>
              <div class="tab-pane" id="tab-settings">
                <div class="filter-bar" id="settings-header"></div>
                <div class="scroll" id="settings-content"></div>
              </div>
            </div>

            <nav class="tabbar">
              <button data-tab="today" class="active">
                <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg></span>
                <span class="tab-label">Today</span>
              </button>
              <button data-tab="map">
                <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg></span>
                <span class="tab-label">Map</span>
              </button>
              <button data-tab="activities">
                <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="8" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.2" fill="currentColor"/><circle cx="4" cy="12" r="1.2" fill="currentColor"/><circle cx="4" cy="18" r="1.2" fill="currentColor"/></svg></span>
                <span class="tab-label">Activities</span>
              </button>
              <button data-tab="todo">
                <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="3 7 5 9 9 5"/><line x1="13" y1="7" x2="20" y2="7"/><polyline points="3 14 5 16 9 12"/><line x1="13" y1="14" x2="20" y2="14"/><polyline points="3 21 5 21 5 21"/><line x1="13" y1="20" x2="20" y2="20"/></svg></span>
                <span class="tab-label">To-Do</span>
              </button>
              <button data-tab="settings">
                <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
                <span class="tab-label">Settings</span>
              </button>
            </nav>

          </div>

          <div id="sheet-backdrop" class="sheet-backdrop"></div>
          <div id="sheet" class="sheet"></div>

          <div id="fullscreen-map" class="fullscreen-map">
            <div class="fm-header">
              <div id="fm-title" class="fm-title">Day —</div>
              <button id="fm-back" class="back-btn" aria-label="Close">✕</button>
            </div>
            <button id="fm-locate" class="map-action-btn" aria-label="My location">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
            </button>
            <div id="map-fullscreen"></div>
          </div>

          <div id="offline-banner" class="offline-banner">📡 Offline</div>

          <!-- Filter tray (Map + Activities) -->
          <div id="filter-tray-backdrop" class="sheet-backdrop"></div>
          <div id="filter-tray" class="sheet tray"></div>
        </div>
        <!-- ─── End inlined PWA ─── -->

      </div>
    </div>
  </div>

  <div class="caption">
    iPhone 15 Pro · 393 × 852pt · Dark mode
    <a href="trip-app.html">Open standalone →</a>
  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  // Quick-jump strip drives the iPhone's bottom tab bar.
  document.querySelectorAll('#qj button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#qj button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const t = document.querySelector('.tabbar button[data-tab="' + btn.dataset.tab + '"]');
      if (t) t.click();
    });
  });
</script>

</body>
</html>
